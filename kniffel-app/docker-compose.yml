services:
  postgres:
    image: postgres:16-alpine
    container_name: kniffel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kniffel
      POSTGRES_PASSWORD: kniffel_dev
      POSTGRES_DB: kniffel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
